<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureChat P2P</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10;--bg2:#0f1218;--bg3:#161b24;--bg4:#1c2330;
  --border:rgba(99,210,255,0.1);--border2:rgba(99,210,255,0.2);
  --accent:#63d2ff;--accent2:#a78bfa;--accent3:#34d399;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#4a5568;
  --danger:#f87171;--warn:#fbbf24;
  --mono:'JetBrains Mono',monospace;--sans:'Sora',sans-serif;
  --r:12px;--rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* SCREENS */
.screen{display:none;flex-direction:column;height:100dvh;position:relative}
.screen.active{display:flex}

/* JOIN */
#join-screen{align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(99,210,255,0.06) 0%,transparent 70%)}
.join-card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;box-shadow:0 0 80px rgba(99,210,255,0.04),0 24px 48px rgba(0,0,0,0.5)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-family:var(--mono);font-size:18px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-family:var(--mono);color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;font-family:var(--mono);font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,210,255,.1)}
.field input::placeholder{color:var(--text3)}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--rs);font-family:var(--mono);font-size:13px;font-weight:700;color:#0a0c10;cursor:pointer;letter-spacing:.05em;transition:opacity .2s,transform .1s;margin-top:8px}
.btn-primary:hover{opacity:.9}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.info-box{margin-top:20px;padding:12px 14px;background:rgba(99,210,255,.05);border:1px solid rgba(99,210,255,.12);border-radius:var(--rs);font-size:11px;color:var(--text2);line-height:1.6;font-family:var(--mono)}
.info-box span{color:var(--accent)}

/* WAIT */
#wait-screen{align-items:center;justify-content:center;gap:24px;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(167,139,250,.06) 0%,transparent 70%)}
.wait-card{text-align:center;max-width:360px;padding:48px 32px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px}
.spinner{width:56px;height:56px;margin:0 auto 24px;position:relative}
.spinner::before,.spinner::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
.spinner::before{border-top-color:var(--accent);animation:spin 1.2s linear infinite}
.spinner::after{border-bottom-color:var(--accent2);animation:spin 1.8s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.wait-title{font-size:18px;font-weight:600;margin-bottom:8px}
.wait-sub{color:var(--text2);font-size:13px;line-height:1.6}
.wait-room{font-family:var(--mono);font-size:13px;padding:8px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--accent);margin-top:16px;display:inline-block}
.btn-cancel{background:transparent;border:1px solid var(--border2);border-radius:var(--rs);padding:10px 24px;color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .2s;margin-top:20px}
.btn-cancel:hover{border-color:var(--danger);color:var(--danger)}

/* CHAT */
#chat-screen{background:var(--bg)}
.chat-header{padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.peer-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0a0c10;flex-shrink:0}
.peer-info{flex:1;min-width:0}
.peer-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.peer-status{font-size:11px;color:var(--accent3);font-family:var(--mono);display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pdot 2s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.4}}
.header-badges{display:flex;gap:8px;align-items:center}
.badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;letter-spacing:.06em}
.badge-enc{background:rgba(52,211,153,.12);color:var(--accent3);border:1px solid rgba(52,211,153,.2)}
.badge-p2p{background:rgba(99,210,255,.1);color:var(--accent);border:1px solid rgba(99,210,255,.2)}

.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.msg{display:flex;flex-direction:column;max-width:72%;animation:min .2s ease}
@keyframes min{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg.mine+.msg.theirs,.msg.theirs+.msg.mine{margin-top:10px}

.bubble{padding:9px 13px;border-radius:16px;line-height:1.55;font-size:14px;word-break:break-word;white-space:pre-wrap}
.msg.mine .bubble{background:linear-gradient(135deg,rgba(99,210,255,.18),rgba(167,139,250,.15));border:1px solid rgba(99,210,255,.2);border-bottom-right-radius:4px}
.msg.theirs .bubble{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px}

.msg-meta{display:flex;align-items:center;gap:5px;margin-top:3px;padding:0 3px}
.msg-time{font-family:var(--mono);font-size:10px;color:var(--text3)}
.msg-receipt{font-size:11px;color:var(--text3);transition:color .3s}
.msg-receipt.seen{color:var(--accent)}

.file-bubble{display:flex;align-items:center;gap:12px;padding:10px 14px;min-width:220px}
.file-icon{width:36px;height:36px;background:rgba(99,210,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:2px}
.file-dl{width:28px;height:28px;border-radius:50%;background:rgba(99,210,255,.15);border:1px solid rgba(99,210,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0;transition:background .2s}
.file-dl:hover{background:rgba(99,210,255,.25)}
.progress-bar{height:2px;background:var(--border);border-radius:1px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:1px;transition:width .1s}

.sys-msg{text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3);margin:8px 0}
.sys-msg.connected{color:var(--accent3)}
.sys-msg.warning{color:var(--warn)}

.typing-indicator{align-self:flex-start;display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;opacity:0;transition:opacity .2s;margin-bottom:2px}
.typing-indicator.visible{opacity:1}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--text2);animation:ty 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

.input-area{padding:12px 16px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:8px 12px;transition:border-color .2s}
.input-row:focus-within{border-color:var(--border2)}
.input-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;font-size:16px;border-radius:6px;transition:color .2s,background .2s;flex-shrink:0;width:28px;height:28px;line-height:1;display:flex;align-items:center;justify-content:center}
.input-btn:hover{color:var(--accent);background:rgba(99,210,255,.08)}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;resize:none;max-height:120px;min-height:24px;line-height:1.5;padding:2px 0}
#msg-input::placeholder{color:var(--text3)}
.send-btn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .1s}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.9)}
.send-btn svg{width:14px;height:14px;fill:#0a0c10}

.emoji-picker{position:absolute;bottom:80px;left:16px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:12px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;width:calc(100% - 32px);max-width:380px}
.emoji-picker.open{display:block;animation:pin .15s ease}
@keyframes pin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.emoji-cats{display:flex;gap:4px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.emoji-cat{flex:1;background:none;border:none;padding:6px 4px;border-radius:6px;cursor:pointer;font-size:15px;text-align:center;transition:background .15s}
.emoji-cat:hover,.emoji-cat.active{background:var(--bg3)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:180px;overflow-y:auto}
.emoji-btn{background:none;border:none;font-size:20px;padding:6px 4px;border-radius:6px;cursor:pointer;text-align:center;transition:background .1s;line-height:1}
.emoji-btn:hover{background:var(--bg3)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 16px;font-family:var(--mono);font-size:12px;color:var(--text2);opacity:0;transition:opacity .2s,transform .2s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#file-input{display:none}
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen" class="screen active">
  <div class="join-card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <div>
        <div class="logo-text">SecureChat</div>
        <div class="logo-sub">P2P · AES-256-GCM · No server</div>
      </div>
    </div>
    <div class="field">
      <label>Votre pseudonyme</label>
      <input type="text" id="username" placeholder="Alice" maxlength="24" autocomplete="off">
    </div>
    <div class="field">
      <label>Nom de la salle</label>
      <input type="text" id="room-name" placeholder="salle-secrete-42" maxlength="48" autocomplete="off">
    </div>
    <div class="field">
      <label>Clé secrète partagée</label>
      <input type="password" id="secret-key" placeholder="••••••••••" maxlength="64" autocomplete="off">
    </div>
    <button class="btn-primary" id="join-btn" onclick="joinRoom()">Rejoindre →</button>
    <div class="info-box">
      <span>⚡ Auto-connexion</span> si nom + clé identiques.<br>
      <span>🔒 AES-256-GCM</span> — chiffré dans le navigateur.<br>
      <span>🌐 WebRTC P2P</span> — aucun message stocké.
    </div>
  </div>
</div>

<!-- WAIT SCREEN -->
<div id="wait-screen" class="screen">
  <div class="wait-card">
    <div class="spinner"></div>
    <div class="wait-title">Salle d'attente</div>
    <div class="wait-sub">En attente de l'autre participant avec la même clé…</div>
    <div class="wait-room" id="wait-room-label"></div>
    <button class="btn-cancel" onclick="leaveWaiting()">✕ Annuler</button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen" class="screen">
  <div class="chat-header">
    <div class="peer-avatar" id="peer-avatar">?</div>
    <div class="peer-info">
      <div class="peer-name" id="peer-name">—</div>
      <div class="peer-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Connecté · E2E chiffré</span>
      </div>
    </div>
    <div class="header-badges">
      <div class="badge badge-enc">AES-256</div>
      <div class="badge badge-p2p">P2P</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="emoji-picker" id="emoji-picker"></div>

  <div class="input-area">
    <div class="input-row">
      <button class="input-btn" id="emoji-toggle-btn" onclick="toggleEmoji()" title="Emojis">😊</button>
      <button class="input-btn" onclick="document.getElementById('file-input').click()" title="Fichier">📎</button>
      <textarea id="msg-input" placeholder="Message chiffré…" rows="1"
        onkeydown="onKey(event)" oninput="onInput()"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 12L22 2L15 22L11 13L2 12Z"/></svg>
      </button>
    </div>
  </div>
  <input type="file" id="file-input" onchange="sendFile(this.files[0])">
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ─── EMOJI DATA ────────────────────────────────────────
const EMOJIS = {
  '😀':['😀','😂','🤣','😍','🥰','😎','🤔','😴','😭','🥺','😡','🤯','🤩','😇','😈','🤮','😷','🤒','🎉','❤️','🔥','💯','✨','👍','👎','👋','🤝','🙏','💪','🧠'],
  '🐶':['🐶','🐱','🐭','🐰','🦊','🐻','🐼','🐨','🦁','🐮','🐷','🐸','🐵','🦄','🦋','🐝','🌸','🌺','🌻','🌈','⭐','🌙','☀️','❄️','🌊','🍀','🌴','🦀','🐠','🦈'],
  '🍎':['🍎','🍊','🍋','🍇','🍓','🍑','🥝','🍕','🍔','🌮','🍜','🍣','🍦','🎂','🍩','☕','🧃','🍺','🥂','🍾','🧁','🥐','🥗','🍿','🥨','🍫','🍭','🧋','🥤','🍹'],
  '🚀':['🚀','✈️','🚗','🚕','🚌','🚂','🛸','🚁','⛵','🚤','🏎️','🚓','🚑','🚒','🛵','🚲','🛷','🗺️','🧭','🏁','🚦','🌍','🏔️','🏖️','🏕️','🗼','🏟️','🎡','🎢','🎠'],
  '💻':['💻','📱','⌨️','🖱️','🖥️','📷','📸','📹','🎮','🕹️','📺','📻','🔋','🔌','💡','🔦','📡','🔭','🔬','🧪','🧬','🔮','🪄','🎭','🎨','🎬','🎤','🎧','🎵','🎶'],
};
const EMOJI_CATS = Object.keys(EMOJIS);
let curCat = EMOJI_CATS[0];

function buildEmojiPicker() {
  const p = document.getElementById('emoji-picker');
  p.innerHTML = '';
  const cats = document.createElement('div');
  cats.className = 'emoji-cats';
  EMOJI_CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'emoji-cat' + (c === curCat ? ' active' : '');
    b.textContent = c;
    b.onclick = () => { curCat = c; document.querySelectorAll('.emoji-cat').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderEmojiGrid(); };
    cats.appendChild(b);
  });
  const grid = document.createElement('div');
  grid.className = 'emoji-grid';
  grid.id = 'emoji-grid';
  p.appendChild(cats);
  p.appendChild(grid);
  renderEmojiGrid();
}

function renderEmojiGrid() {
  const g = document.getElementById('emoji-grid');
  g.innerHTML = '';
  EMOJIS[curCat].forEach(e => {
    const b = document.createElement('button');
    b.className = 'emoji-btn';
    b.textContent = e;
    b.onclick = () => insertEmoji(e);
    g.appendChild(b);
  });
}

function insertEmoji(e) {
  const inp = document.getElementById('msg-input');
  const s = inp.selectionStart, en = inp.selectionEnd;
  inp.value = inp.value.slice(0,s) + e + inp.value.slice(en);
  inp.focus();
  inp.setSelectionRange(s+e.length, s+e.length);
  autoResize(inp);
}

function toggleEmoji() {
  document.getElementById('emoji-picker').classList.toggle('open');
}

document.addEventListener('click', e => {
  const p = document.getElementById('emoji-picker');
  const b = document.getElementById('emoji-toggle-btn');
  if (!p.contains(e.target) && e.target !== b) p.classList.remove('open');
});

// ─── CRYPTO ────────────────────────────────────────────
let cryptoKey = null;

async function deriveKey(room, secret) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey('raw', enc.encode(secret), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:enc.encode('sc-salt-'+room), iterations:100000, hash:'SHA-256' },
    base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function encrypt(str) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, cryptoKey, new TextEncoder().encode(str));
  const out = new Uint8Array(12 + ct.byteLength);
  out.set(iv); out.set(new Uint8Array(ct), 12);
  return btoa(String.fromCharCode(...out));
}

async function decrypt(b64) {
  try {
    const buf = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:buf.slice(0,12) }, cryptoKey, buf.slice(12));
    return new TextDecoder().decode(pt);
  } catch { return null; }
}

// ─── STATE ─────────────────────────────────────────────
let myPeer=null, myConn=null, myUsername='', peerUsername='', myRoom='';
let typingTimer=null, isTyping=false;
let pendingFiles={}, myMsgMap={};

function peerId(room, suffix) {
  return 'sc-' + btoa(unescape(encodeURIComponent(room))).replace(/[^a-zA-Z0-9]/g,'').slice(0,28) + '-' + suffix;
}

// ─── JOIN ──────────────────────────────────────────────
async function joinRoom() {
  const u = document.getElementById('username').value.trim();
  const r = document.getElementById('room-name').value.trim();
  const k = document.getElementById('secret-key').value.trim();
  if (!u||!r||!k) { showToast('Remplissez tous les champs'); return; }

  document.getElementById('join-btn').disabled = true;
  myUsername = u; myRoom = r;
  cryptoKey = await deriveKey(r, k);

  showScreen('wait-screen');
  document.getElementById('wait-room-label').textContent = '# ' + r;
  startPeer();
}

function startPeer() {
  const hostId = peerId(myRoom, 'h');
  const guestId = peerId(myRoom, 'g') + Date.now().toString(36).slice(-4);
  const tmpPeer = new Peer(guestId, { debug:0 });
  let done = false;

  tmpPeer.on('open', () => {
    const conn = tmpPeer.connect(hostId, { reliable:true, serialization:'raw' });
    const failTimer = setTimeout(() => {
      if (!done) { done=true; conn.close(); tmpPeer.destroy(); becomeHost(); }
    }, 5000);
    conn.on('open', () => {
      if (done) return;
      done=true; clearTimeout(failTimer);
      myPeer = tmpPeer;
      setupConn(conn);
    });
    conn.on('error', () => {
      if (!done) { done=true; clearTimeout(failTimer); tmpPeer.destroy(); becomeHost(); }
    });
  });
  tmpPeer.on('error', e => {
    if (!done) { done=true; becomeHost(); }
  });
}

function becomeHost() {
  if (!document.getElementById('wait-screen').classList.contains('active')) return;
  const hostId = peerId(myRoom, 'h');
  if (myPeer) { try { myPeer.destroy(); } catch(e){} myPeer=null; }
  myPeer = new Peer(hostId, { debug:0 });
  myPeer.on('open', () => { /* waiting */ });
  myPeer.on('connection', conn => {
    if (myConn) return; // already connected
    setupConn(conn);
  });
  myPeer.on('error', e => {
    // Host ID taken (another host already) — become guest again after delay
    if (myPeer) { try { myPeer.destroy(); } catch(e){} myPeer=null; }
    setTimeout(startPeer, 2500);
  });
}

// ─── CONNECTION ────────────────────────────────────────
async function setupConn(conn) {
  myConn = conn;

  // Attach data handler immediately — before open fires
  conn.on('data', async raw => {
    let plain;
    try { plain = await decrypt(typeof raw === 'string' ? raw : new TextDecoder().decode(raw)); } catch(e) { plain=null; }
    if (!plain) { showToast('⚠️ Clé incorrecte ou erreur'); return; }
    let msg; try { msg = JSON.parse(plain); } catch { return; }
    handleMsg(msg);
  });

  conn.on('close', () => {
    appendSys('⚠️ Connexion fermée', 'warning');
    document.getElementById('status-dot').style.background = '#f87171';
    document.getElementById('status-text').textContent = 'Déconnecté';
  });

  conn.on('error', e => appendSys('Erreur connexion: '+e, 'warning'));

  // Send hello — if already open, send immediately; otherwise wait for open event
  async function sendHello() {
    conn.send(await encrypt(JSON.stringify({ type:'hello', name:myUsername })));
  }

  if (conn.open) {
    sendHello();
  } else {
    conn.on('open', () => sendHello());
  }
}

let helloDone = false;

function handleMsg(msg) {
  switch (msg.type) {
    case 'hello':
      if (helloDone) break;
      helloDone = true;
      peerUsername = msg.name || 'Pair';
      document.getElementById('peer-name').textContent = peerUsername;
      document.getElementById('peer-avatar').textContent = peerUsername[0].toUpperCase();
      showScreen('chat-screen');
      appendSys('✓ Connecté avec ' + peerUsername, 'connected');
      buildEmojiPicker();
      break;
    case 'text':
      appendBubble('theirs', msg.content, msg.id, msg.time);
      sendEncoded({ type:'seen', id:msg.id });
      break;
    case 'typing':
      document.getElementById('typing-indicator').classList.toggle('visible', msg.active);
      if (msg.active) scrollBottom();
      break;
    case 'seen':
      const el = myMsgMap[msg.id];
      if (el) { el.textContent = '✓✓'; el.classList.add('seen'); }
      break;
    case 'file-meta':
      pendingFiles[msg.id] = { name:msg.name, size:msg.size, type:msg.mime, chunks:[], total:msg.chunks, received:0 };
      appendFileBubble('theirs', msg);
      break;
    case 'file-chunk':
      recvChunk(msg);
      break;
  }
}

// ─── SEND ──────────────────────────────────────────────
async function sendEncoded(obj) {
  if (!myConn || !myConn.open) return;
  myConn.send(await encrypt(JSON.stringify(obj)));
}

async function sendMessage() {
  if (!myConn || !myConn.open) { showToast('Non connecté'); return; }
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; autoResize(inp);
  const id = genId(), time = timeStr();
  sendEncoded({ type:'text', id, content:text, time });
  appendBubble('mine', text, id, time);
  stopTyping();
}

const CHUNK = 16384;

async function sendFile(file) {
  if (!file || !myConn || !myConn.open) return;
  if (file.size > 50*1024*1024) { showToast('Max 50 MB'); return; }
  document.getElementById('file-input').value = '';
  const id = genId(), time = timeStr();
  const totalChunks = Math.ceil(file.size / CHUNK);
  const meta = { type:'file-meta', id, name:file.name, size:file.size, mime:file.type, chunks:totalChunks, time };
  sendEncoded(meta);
  appendFileBubble('mine', meta);
  const bytes = new Uint8Array(await file.arrayBuffer());
  for (let i = 0; i < totalChunks; i++) {
    const slice = bytes.slice(i*CHUNK, (i+1)*CHUNK);
    const b64 = btoa(String.fromCharCode(...slice));
    sendEncoded({ type:'file-chunk', id, index:i, data:b64, total:totalChunks });
    updateProgress(id, i+1, totalChunks);
    await new Promise(r => setTimeout(r, 4));
  }
}

function recvChunk(msg) {
  const pf = pendingFiles[msg.id];
  if (!pf) return;
  pf.chunks[msg.index] = msg.data;
  pf.received++;
  updateProgress(msg.id, pf.received, pf.total);
  if (pf.received === pf.total) {
    const bytes = Uint8Array.from(atob(pf.chunks.join('')), c=>c.charCodeAt(0));
    const url = URL.createObjectURL(new Blob([bytes], { type: pf.type||'application/octet-stream' }));
    const btn = document.querySelector(`[data-file-id="${msg.id}"]`);
    if (btn) { btn.textContent = '⬇'; btn.onclick = () => { const a=document.createElement('a'); a.href=url; a.download=pf.name; a.click(); }; }
    updateProgress(msg.id, pf.total, pf.total);
    delete pendingFiles[msg.id];
  }
}

function updateProgress(id, n, total) {
  const bar = document.querySelector(`[data-progress="${id}"]`);
  if (!bar) return;
  const pct = (n/total)*100;
  bar.style.width = pct + '%';
  if (pct >= 100) setTimeout(() => { if(bar.parentElement) bar.parentElement.style.display='none'; }, 600);
}

// ─── DOM ───────────────────────────────────────────────
function appendBubble(side, text, id, time) {
  const msgs = document.getElementById('messages');
  const typing = document.getElementById('typing-indicator');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + side;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const ts = document.createElement('span');
  ts.className = 'msg-time'; ts.textContent = time;
  meta.appendChild(ts);
  if (side === 'mine') {
    const r = document.createElement('span');
    r.className = 'msg-receipt'; r.textContent = '✓';
    meta.appendChild(r);
    myMsgMap[id] = r;
  }
  wrap.appendChild(bubble); wrap.appendChild(meta);
  msgs.insertBefore(wrap, typing);
  scrollBottom();
}

function appendFileBubble(side, meta) {
  const msgs = document.getElementById('messages');
  const typing = document.getElementById('typing-indicator');
  const wrap = document.createElement('div'); wrap.className = 'msg ' + side;
  const bubble = document.createElement('div'); bubble.className = 'bubble file-bubble';
  const icon = document.createElement('div'); icon.className = 'file-icon'; icon.textContent = fileIcon(meta.mime);
  const info = document.createElement('div'); info.className = 'file-info';
  const nm = document.createElement('div'); nm.className = 'file-name'; nm.textContent = meta.name;
  const sz = document.createElement('div'); sz.className = 'file-size'; sz.textContent = fmtSize(meta.size);
  const pb = document.createElement('div'); pb.className = 'progress-bar';
  const pf = document.createElement('div'); pf.className = 'progress-fill'; pf.setAttribute('data-progress', meta.id); pf.style.width='0%';
  pb.appendChild(pf);
  info.appendChild(nm); info.appendChild(sz); info.appendChild(pb);
  const dl = document.createElement('button'); dl.className = 'file-dl';
  dl.textContent = side==='mine' ? '✓' : '⏳'; dl.setAttribute('data-file-id', meta.id);
  bubble.appendChild(icon); bubble.appendChild(info); bubble.appendChild(dl);
  wrap.appendChild(bubble);
  msgs.insertBefore(wrap, typing);
  scrollBottom();
}

function appendSys(text, cls) {
  const msgs = document.getElementById('messages');
  const typing = document.getElementById('typing-indicator');
  const d = document.createElement('div');
  d.className = 'sys-msg' + (cls?' '+cls:'');
  d.textContent = text;
  msgs.insertBefore(d, typing);
  scrollBottom();
}

function scrollBottom() {
  const m = document.getElementById('messages');
  requestAnimationFrame(() => m.scrollTop = m.scrollHeight);
}

// ─── INPUT ─────────────────────────────────────────────
function onKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function onInput() {
  autoResize(document.getElementById('msg-input'));
  if (!isTyping) { isTyping=true; sendEncoded({ type:'typing', active:true }); }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 1500);
}

function stopTyping() {
  if (isTyping) { isTyping=false; sendEncoded({ type:'typing', active:false }); }
  clearTimeout(typingTimer);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─── NAV ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function leaveWaiting() {
  if (myPeer) { try { myPeer.destroy(); } catch(e){} myPeer=null; }
  myConn=null;
  helloDone=false;
  document.getElementById('join-btn').disabled = false;
  showScreen('join-screen');
}

// ─── UTILS ─────────────────────────────────────────────
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function timeStr() { return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function fmtSize(b) { if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function fileIcon(m) {
  if (!m) return '📄';
  if (m.startsWith('image/')) return '🖼';
  if (m.startsWith('video/')) return '🎬';
  if (m.startsWith('audio/')) return '🎵';
  if (m.includes('pdf')) return '📕';
  if (m.includes('zip')||m.includes('rar')) return '📦';
  if (m.includes('text')) return '📝';
  return '📄';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
