<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetChat AES-256 - Messagerie Chiffrée</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #0f3460;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #e94560;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e94560;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: 600;
        }

        .status.waiting {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .status.connected {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .status.error {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .chat-messages {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            margin: 20px 0;
            display: none;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .message.sent {
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            margin-left: auto;
            text-align: right;
        }

        .message.received {
            background: rgba(255, 255, 255, 0.1);
            margin-right: auto;
        }

        .message .time {
            font-size: 0.75em;
            color: #a0a0a0;
            margin-top: 5px;
        }

        .chat-input {
            display: none;
            margin-top: 20px;
        }

        .chat-input input {
            width: calc(100% - 100px);
            padding: 15px;
            border: 2px solid #0f3460;
            border-radius: 8px 0 0 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
        }

        .chat-input button {
            width: 80px;
            padding: 15px;
            background: #e94560;
            border: none;
            border-radius: 0 8px 8px 0;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-input button:hover {
            background: #ff6b6b;
        }

        .encryption-info {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid #28a745;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.9em;
        }

        .encryption-info strong {
            color: #28a745;
        }

        .hidden {
            display: none;
        }

        .leave-btn {
            background: #dc3545;
            margin-top: 10px;
        }

        .leave-btn:hover {
            background: #c82333;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .peer-id-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.85em;
            margin: 10px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 NetChat AES-256</h1>
            <p>Messagerie Peer-to-Peer Chiffrée de Bout en Bout</p>
        </div>

        <div class="chat-container">
            <!-- Formulaire de connexion -->
            <div id="loginForm">
                <div class="form-group">
                    <label for="username">👤 Votre nom</label>
                    <input type="text" id="username" placeholder="Entrez votre pseudonyme" maxlength="30">
                </div>

                <div class="form-group">
                    <label for="roomName">🚪 Nom de la salle</label>
                    <input type="text" id="roomName" placeholder="Nom de la salle (identique pour les 2 pairs)" maxlength="50">
                </div>

                <div class="form-group">
                    <label for="secretKey">🔑 Clé secrète</label>
                    <input type="password" id="secretKey" placeholder="Clé de chiffrement (identique pour les 2 pairs)" maxlength="100">
                </div>

                <button class="btn" id="joinBtn" onclick="joinRoom()">
                    🚪 Rejoindre la salle
                </button>

                <div id="connectionStatus" class="status hidden"></div>
            </div>

            <!-- Interface de chat -->
            <div id="chatInterface" class="hidden">
                <div class="encryption-info">
                    <strong>🔒 Chiffrement E2E Activé</strong><br>
                    AES-256 | Vos messages sont chiffrés localement avant envoi
                </div>

                <div class="status waiting" id="chatStatus">
                    ⏳ Salle active — En attente de votre pair
                </div>

                <div class="peer-id-display">
                    <strong>Votre ID:</strong> <span id="peerIdDisplay">...</span>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="chat-input" id="chatInput">
                    <input type="text" id="messageInput" placeholder="Écrivez votre message..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">Envoyer</button>
                </div>

                <button class="btn leave-btn" onclick="leaveRoom()">
                    ✕ Quitter la salle
                </button>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let peer = null;
        let conn = null;
        let username = '';
        let roomName = '';
        let secretKey = '';
        let isConnected = false;

        // Initialiser la connexion PeerJS
        function initializePeer() {
            // Créer un ID basé sur le nom de salle + timestamp pour éviter les collisions
            const roomId = roomName.toLowerCase().replace(/\s+/g, '-');
            const timestamp = Date.now().toString(36);
            const peerId = `netchat-${roomId}-${timestamp}`;

            peer = new Peer(peerId, {
                debug: 2
            });

            peer.on('open', (id) => {
                console.log('Mon ID PeerJS:', id);
                document.getElementById('peerIdDisplay').textContent = id;
                updateStatus('⏳ Salle active — En attente de votre pair', 'waiting');
                
                // Essayer de se connecter à un pair existant dans la même salle
                tryConnectToPeer(roomId);
            });

            peer.on('connection', (connection) => {
                handleIncomingConnection(connection);
            });

            peer.on('error', (err) => {
                console.error('Erreur PeerJS:', err);
                updateStatus('❌ Erreur de connexion: ' + err.type, 'error');
            });

            peer.on('disconnected', () => {
                console.log('Déconnecté du serveur PeerJS');
                if (isConnected) {
                    updateStatus('⚠️ Déconnecté du serveur de signalisation', 'error');
                }
            });
        }

        // Essayer de se connecter à un pair existant
        function tryConnectToPeer(roomId) {
            // Attendre un peu puis essayer de se connecter
            setTimeout(() => {
                // Liste des IDs possibles (on essaie les connexions récentes)
                const possiblePeerIds = [
                    `netchat-${roomId}-init`,
                    `netchat-${roomId}-host`
                ];

                for (const peerId of possiblePeerIds) {
                    try {
                        const connection = peer.connect(peerId, {
                            metadata: {
                                username: username,
                                room: roomName
                            }
                        });
                        
                        connection.on('open', () => {
                            handleOutgoingConnection(connection);
                            return;
                        });
                    } catch (e) {
                        // Continuer avec le prochain ID
                    }
                }
            }, 1000);
        }

        // Gérer une connexion entrante
        function handleIncomingConnection(connection) {
            conn = connection;
            
            conn.on('open', () => {
                isConnected = true;
                username = conn.metadata.username || 'Pair';
                updateStatus('✅ Connecté avec ' + username, 'connected');
                showChatInterface();
                
                // Envoyer un message de bienvenue
                sendSystemMessage(username + ' a rejoint la conversation');
            });

            conn.on('data', (data) => {
                handleData(data);
            });

            conn.on('close', () => {
                handleDisconnect();
            });

            conn.on('error', (err) => {
                console.error('Erreur de connexion:', err);
            });
        }

        // Gérer une connexion sortante
        function handleOutgoingConnection(connection) {
            conn = connection;
            
            conn.on('open', () => {
                isConnected = true;
                updateStatus('✅ Connecté avec ' + username, 'connected');
                showChatInterface();
                sendSystemMessage(username + ' a rejoint la conversation');
            });

            conn.on('data', (data) => {
                handleData(data);
            });

            conn.on('close', () => {
                handleDisconnect();
            });
        }

        // Traiter les données reçues
        function handleData(data) {
            if (data.type === 'message') {
                // Déchiffrer le message
                const decryptedMessage = decryptMessage(data.content, secretKey);
                if (decryptedMessage) {
                    displayMessage(decryptedMessage, 'received', data.username);
                }
            } else if (data.type === 'system') {
                displaySystemMessage(data.content);
            }
        }

        // Gérer la déconnexion
        function handleDisconnect() {
            isConnected = false;
            updateStatus('⚠️ Votre pair s\'est déconnecté', 'error');
            document.getElementById('chatInput').style.display = 'none';
            document.getElementById('chatMessages').style.display = 'none';
            
            setTimeout(() => {
                updateStatus('⏳ En attente de reconnexion...', 'waiting');
            }, 2000);
        }

        // Rejoindre une salle
        function joinRoom() {
            username = document.getElementById('username').value.trim();
            roomName = document.getElementById('roomName').value.trim();
            secretKey = document.getElementById('secretKey').value;

            // Validation
            if (!username) {
                updateStatus('❌ Veuillez entrer votre nom', 'error');
                return;
            }

            if (!roomName) {
                updateStatus('❌ Veuillez entrer un nom de salle', 'error');
                return;
            }

            if (!secretKey || secretKey.length < 4) {
                updateStatus('❌ La clé secrète doit faire au moins 4 caractères', 'error');
                return;
            }

            // Désactiver le bouton
            document.getElementById('joinBtn').disabled = true;
            document.getElementById('joinBtn').innerHTML = '<span class="loading">🔄 Initialisation...</span>';

            // Initialiser la connexion PeerJS
            initializePeer();

            updateStatus('🔄 Connexion au serveur de signalisation...', 'waiting');
        }

        // Afficher l'interface de chat
        function showChatInterface() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('chatInterface').classList.remove('hidden');
            document.getElementById('chatMessages').style.display = 'block';
            document.getElementById('chatInput').style.display = 'flex';
        }

        // Mettre à jour le statut
        function updateStatus(message, type) {
            const statusDiv = document.getElementById('connectionStatus');
            const chatStatusDiv = document.getElementById('chatStatus');
            
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.classList.remove('hidden');

            if (chatStatusDiv) {
                chatStatusDiv.textContent = message;
                chatStatusDiv.className = 'status ' + type;
            }
        }

        // Envoyer un message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || !isConnected || !conn) {
                return;
            }

            // Chiffrer le message
            const encryptedMessage = encryptMessage(message, secretKey);
            
            if (encryptedMessage) {
                // Envoyer le message chiffré
                conn.send({
                    type: 'message',
                    content: encryptedMessage,
                    username: username,
                    timestamp: new Date().toISOString()
                });

                // Afficher le message localement
                displayMessage(message, 'sent', username);
                input.value = '';
            }
        }

        // Envoyer un message système
        function sendSystemMessage(content) {
            if (conn && conn.open) {
                conn.send({
                    type: 'system',
                    content: content,
                    timestamp: new Date().toISOString()
                });
            }
            displaySystemMessage(content);
        }

        // Afficher un message
        function displayMessage(content, type, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;
            
            const time = new Date().toLocaleTimeString('fr-FR', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            messageDiv.innerHTML = `
                <div class="content">${escapeHtml(content)}</div>
                <div class="time">${type === 'sent' ? 'Vous' : sender} • ${time}</div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Afficher un message système
        function displaySystemMessage(content) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.style.textAlign = 'center';
            messageDiv.style.color = '#a0a0a0';
            messageDiv.style.fontStyle = 'italic';
            messageDiv.style.margin = '10px 0';
            messageDiv.style.fontSize = '0.9em';
            messageDiv.textContent = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Gérer la touche Entrée
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Quitter la salle
        function leaveRoom() {
            if (conn) {
                conn.close();
            }
            if (peer) {
                peer.destroy();
            }

            isConnected = false;
            conn = null;
            peer = null;

            document.getElementById('chatInterface').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('joinBtn').disabled = false;
            document.getElementById('joinBtn').innerHTML = '🚪 Rejoindre la salle';
            document.getElementById('connectionStatus').classList.add('hidden');
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('username').value = '';
            document.getElementById('roomName').value = '';
            document.getElementById('secretKey').value = '';
        }

        // Chiffrer un message avec AES-256
        function encryptMessage(message, key) {
            try {
                // Utiliser SHA-256 pour dériver une clé de 256 bits à partir de la clé secrète
                const keyHash = CryptoJS.SHA256(key);
                const encrypted = CryptoJS.AES.encrypt(message, keyHash.toString());
                return encrypted.toString();
            } catch (err) {
                console.error('Erreur de chiffrement:', err);
                return null;
            }
        }

        // Déchiffrer un message avec AES-256
        function decryptMessage(encryptedMessage, key) {
            try {
                const keyHash = CryptoJS.SHA256(key);
                const decrypted = CryptoJS.AES.decrypt(encryptedMessage, keyHash.toString());
                const decryptedText = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (!decryptedText) {
                    console.warn('Échec du déchiffrement - Clé incorrecte?');
                    return null;
                }
                
                return decryptedText;
            } catch (err) {
                console.error('Erreur de déchiffrement:', err);
                return null;
            }
        }

        // Échapper le HTML pour prévenir les injections XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Nettoyer lors de la fermeture de la page
        window.addEventListener('beforeunload', () => {
            if (conn) {
                conn.close();
            }
            if (peer) {
                peer.destroy();
            }
        });

        // Initialisation au chargement
        console.log('NetChat AES-256 initialisé');
        console.log('Instructions: Les deux utilisateurs doivent entrer le MÊME nom de salle et la MÊME clé secrète');
    </script>
</body>
</html>
