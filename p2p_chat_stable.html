
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Chat Stable</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
body{font-family:Arial;margin:0;background:#111;color:#fff}
header{padding:12px;background:#1f1f1f}
#chat{height:60vh;overflow:auto;padding:10px;border-top:1px solid #333;border-bottom:1px solid #333}
.msg{margin:6px 0}
.me{color:#4ade80}
.peer{color:#60a5fa}
#controls{display:flex;padding:10px}
#controls input{flex:1;padding:10px;font-size:16px}
#controls button{padding:10px 16px}
#top{display:flex;gap:6px;padding:10px}
#status{font-size:12px;color:#aaa}
</style>
</head>
<body>

<header>
<b>P2P Secure Chat</b>
<div id="status">Disconnected</div>
</header>

<div id="top">
<input id="room" placeholder="Room name"/>
<input id="name" placeholder="Your name"/>
<button onclick="start()">Connect</button>
</div>

<div id="chat"></div>

<div id="controls">
<input id="msg" placeholder="Message"/>
<button onclick="sendMsg()">Send</button>
</div>

<script>

let peer
let conn
let roomName
let myName
let retryTimer

const ICE_CONFIG = {
config:{
iceServers:[
{urls:"stun:stun.l.google.com:19302"},
{urls:"stun:stun1.l.google.com:19302"},
{
urls:"turn:openrelay.metered.ca:80",
username:"openrelayproject",
credential:"openrelayproject"
},
{
urls:"turn:openrelay.metered.ca:443",
username:"openrelayproject",
credential:"openrelayproject"
}
]
}
}

function log(msg,cls){

let div=document.createElement("div")
div.className="msg "+cls
div.textContent=msg
document.getElementById("chat").appendChild(div)
document.getElementById("chat").scrollTop=999999

}

function status(t){
document.getElementById("status").textContent=t
}

function start(){

roomName=document.getElementById("room").value.trim()
myName=document.getElementById("name").value.trim()

if(!roomName||!myName){
alert("Enter room and name")
return
}

let myId="ROOM-"+roomName+"-"+Math.floor(Math.random()*999999)

peer=new Peer(myId,ICE_CONFIG)

peer.on("open",id=>{

status("Connected to signaling")

connectHost()

})

peer.on("connection",c=>{

if(conn){
c.close()
return
}

conn=c
setupConn()

})

peer.on("error",err=>{

status("Peer error")

})

}

function connectHost(){

let hostId="ROOM-"+roomName+"-HOST"

let c=peer.connect(hostId,{reliable:true})

c.on("open",()=>{

conn=c
setupConn()

})

c.on("error",()=>{

becomeHost()

})

}

function becomeHost(){

let hostId="ROOM-"+roomName+"-HOST"

try{
peer.destroy()
}catch(e){}

peer=new Peer(hostId,ICE_CONFIG)

peer.on("open",()=>{

status("Waiting for peer...")

})

peer.on("connection",c=>{

conn=c
setupConn()

})

}

function setupConn(){

status("Peer connected")

conn.on("data",data=>{

log(data.name+": "+data.text,"peer")

})

conn.on("close",()=>{

status("Peer disconnected")

})

}

function sendMsg(){

let text=document.getElementById("msg").value

if(!conn||!conn.open){
alert("Not connected")
return
}

conn.send({
name:myName,
text:text
})

log("Me: "+text,"me")

document.getElementById("msg").value=""

}

</script>
</body>
</html>
